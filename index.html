<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

    <link href="./css/bootstrap.min.css" rel="stylesheet" />

  <body>
    <header>
      <nav class="navbar navbar-expand-md navbar-light bg-light">
        <div class="container">
          <a class="navbar-brand" href="#">
            <img class="i-brand" src="./img/brand.png" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-toggle="collapse"
            data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ml-auto">
              <li class="nav-item i-nav-item">
                <i class="i-icon i-icon-calendar"></i>
                <a class="nav-link i-nav-link" href="#">Calendar</a>
              </li>
              <li class="nav-item i-nav-item">
                <i class="i-icon i-icon-login"></i>
                <a
                  class="nav-link i-nav-link"
                  href="#"
                  data-toggle="modal"
                  data-target="#sign-in-modal"
                  >Sign in</a
                >
              </li>
              <li class="nav-item i-nav-item">
                <i class="i-icon i-icon-registration"></i>
                <a class="nav-link i-nav-link" href="#">Register</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

            </li>

        <div class="i-calendar-day">

          </div>
          <div class="card i-calendar-day-item">
            <span class="in">7</span>
          </div>
          <div class="card i-calendar-day-item">
            <span class="in">8</span>
          </div>
          <div class="card i-calendar-day-item">
            <span class="in">9</span>
          </div>
          <div class="card i-calendar-day-item">
            <span class="in">10</span>
          </div>
          <div class="card i-calendar-day-item">

        <div class="i-calendar-day">

          <div class="card i-calendar-day-item">

          <div class="card i-calendar-day-item">

    <footer>
      <span>&#169;ISP-START</span>
    </footer>

    <!-- modal -->
    <div id="sign-in-modal" class="modal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Sign In</h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close"
            >
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <div class="alert alert-success" role="alert">Success</div>
            <div class="alert alert-danger" role="alert">Error message</div>
            <form>
              <div class="form-group">
                <label for="inputEmail">Email address</label>
                <input type="email" class="form-control" id="inputEmail" />
                <small class="form-text i-danger-message">Invaild email</small>
              </div>
              <div class="form-group">
                <label for="inputPassword">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="inputPassword"
                />
                <small class="form-text i-danger-message"
                  >Invaild password</small
                >
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary">Sign in</button>
            <button
              type="button"
              class="btn btn-secondary"
              data-dismiss="modal"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
