<script src="./js/global.js"></script>

<script>
  const { user } = parseQueryString();

  if (!user) {
    backToIndex();
  }

  const template = Handlebars.compile("Hi {{user}}");
  $(".d-user")
    .html(template({ user }))
    .click(function () {
      backToIndex();
    });
</script>
